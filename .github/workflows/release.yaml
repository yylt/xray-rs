on:
  push:
    branches: ["main", "draft"]
    tags: ["*"]
  pull_request:
    branches: ["main"]

env:
  RUST_VERSION: 1.93.0
  BIN_NAME: "xray-rs"

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x86_64
            target: x86_64-unknown-linux-musl
            builder: cargo
            artifact-dir: release
            build-args: "--release --features=jemalloc"

          - name: Linux aarch64
            target: aarch64-unknown-linux-musl
            builder: cross
            artifact-dir: release
            build-args: "--release --features=jemalloc -vv"

          - name: Android aarch64
            target: aarch64-linux-android
            builder: cross
            artifact-dir: release
            build-args: "--release --features=jemalloc"

          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            builder: cargo
            artifact-dir: release-with-symbols
            build-args: "--profile release-with-symbols --no-default-features --features mimalloc,ring"

    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.platform.target }}
          components: rustfmt, clippy

      - name: Install Linux packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      - name: Install cross
        if: matrix.platform.builder == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cargo
        if: matrix.platform.builder == 'cargo'
        env:
          JEMALLOC_SYS_WITH_LG_PAGE: ${{ contains(matrix.platform.target, 'aarch64') && '14' || '12' }}
        run: cargo build ${{ matrix.platform.build-args }} --bin ${{ env.BIN_NAME }} --target ${{ matrix.platform.target }}

      - name: Build with cross
        if: matrix.platform.builder == 'cross'
        env:
          JEMALLOC_SYS_WITH_LG_PAGE: ${{ contains(matrix.platform.target, 'aarch64') && '14' || '12' }}
        run: cross build ${{ matrix.platform.build-args }} --bin ${{ env.BIN_NAME }} --target ${{ matrix.platform.target }}

      - name: Store artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.platform.target }}
          path: target/${{ matrix.platform.target }}/${{ matrix.platform.artifact-dir }}/${{ env.BIN_NAME }}${{ contains(matrix.platform.target, 'windows') && '.exe' || '' }}
          retention-days: 1

  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Git repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4.1.7
        with:
          path: artifacts

      - name: list artifacts
        run: find artifacts/

      - name: Set up Go
        uses: actions/setup-go@v4

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: '~> v1'
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
