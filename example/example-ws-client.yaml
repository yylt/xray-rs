inbounds:
  - listen: 127.0.0.1
    port: 2080
    protocol: http
    tag: http-in
    settings:
      allowTransparent: false

  - listen: 127.0.0.1
    port: 2081
    protocol: socks
    tag: socks-in
    settings:
      udp: true
      ip: 127.0.0.1

outbounds:
  - tag: proxy
    protocol: trojan
    settings:
      address: 127.0.0.1
      port: 10443
      password: test-password-123
    streamSettings:
      network: ws
      security: none
      wsSettings:
        path: /ws
        headers: {}
      sockopt:
        tcpNoDelay: true
