inbounds:
  - listen: 127.0.0.1
    port: 2080
    protocol: http
    tag: http-in
    settings:
      allowTransparent: false
  - listen: 127.0.0.1
    port: 20800
    protocol: api
    tag: api

outbounds:
  - tag: vless-out
    protocol: vless
    settings:
      address: 127.0.0.1
      port: 10443
      id: b3e82297-eab7-0f26-d714-a2091305b989
    streamSettings:
      network: ws
      security: none
      wsSettings:
        path: /ws
        headers: {}
      sockopt:
        tcpNoDelay: true
