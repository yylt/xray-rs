inbounds:
  - listen: 127.0.0.1
    port: 2080
    protocol: http
    tag: http-in
    settings:
      allowTransparent: false

outbounds:
  - tag: proxy-a
    protocol: trojan
    settings:
      address: 127.0.0.1
      port: 10443
      password: test-password-123
    streamSettings:
      network: grpc
      security: none
      grpcSettings:
        serviceName: grpc
        multiMode: false
        authority: 127.0.0.1
      sockopt:
        tcpNoDelay: true

  - tag: proxy-b
    protocol: trojan
    settings:
      address: localhost
      port: 10443
      password: test-password-123
    streamSettings:
      network: grpc
      security: none
      grpcSettings:
        serviceName: grpc
        multiMode: false
        authority: localhost
      sockopt:
        tcpNoDelay: true

routing:
  domainStrategy: IPIfNonMatch
  rules:
    - inboundTag: http-in
      outboundTag: proxy-a
  fallback:
    tags:
      - proxy-b
